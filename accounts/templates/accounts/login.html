<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="//code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="//fonts.googleapis.com/css?family=Titillium+Web:700|Source+Serif+Pro:400,700|Merriweather+Sans:400,700|Source+Sans+Pro:400,300,600,700,300italic,400italic,600italic,700italic"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Import the custom Bootstrap 4 theme from our hosted CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'myapp/css/main.css' %}" />
    <title>Blog account</title>
  </head>
  <body>
    <div class="auth-page">
      <div class="container page">
        <div class="row">
          <div class="col-md-6 offset-md-3 col-xs-12">
            <h1 class="text-xs-center">Log in</h1>
            <p class="text-xs-center">
              <a href="{% url 'signup' %}">アカウントを登録しますか？</a>
            </p>

            <ul class="error-messages">
              {% if error %}
              <li>{{ error }}</li>
              {% endif %}
            </ul>
    
            <form method="post" action="">
              {% csrf_token %}
              <fieldset class="form-group">
                <input class="form-control form-control-lg" type="email" name="email" placeholder="Email" required />
              </fieldset>
              <fieldset class="form-group">
                <input class="form-control form-control-lg" type="password" name="password" placeholder="Password" required/>
              </fieldset>
              <button type="submit" class="btn btn-lg btn-primary pull-xs-right">Log in</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
